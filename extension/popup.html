<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status.connected { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
    .status.disconnected { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .status.detected { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); color: #818cf8; }

    .section { margin-bottom: 12px; }
    .section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

    .pack-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .pack-company { font-size: 13px; font-weight: 600; }
    .pack-title { font-size: 11px; color: #888; }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #818cf8; color: #0a0a0a; }
    .btn-primary:hover { background: #6366f1; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #1a1a1a; color: #e5e5e5; border: 1px solid #333; margin-top: 8px; }
    .btn-secondary:hover { border-color: #818cf8; color: #818cf8; }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-row button { flex: 1; }

    .field-list { font-size: 11px; color: #888; margin-top: 8px; }
    .field-list li { padding: 2px 0; list-style: none; }
    .field-list .filled { color: #22c55e; }
    .field-list .missed { color: #f59e0b; }

    .settings { margin-top: 12px; }
    .settings input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e5e5e5;
      font-size: 12px;
      margin-top: 4px;
    }
    .settings label { font-size: 11px; color: #888; }

    .sync-badge { font-size: 10px; color: #888; margin-top: 4px; text-align: center; }
    .version { font-size: 10px; color: #555; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>JobAgent Auto-Fill</h1>
  <p class="subtitle">Fill job applications with your apply pack materials</p>

  <div id="status" class="status disconnected">Checking connection...</div>

  <div id="ats-info" class="section" style="display:none;">
    <div class="section-title">Detected Platform</div>
    <div id="ats-name" class="status detected">—</div>
  </div>

  <div id="pack-section" class="section" style="display:none;">
    <div class="section-title">Available Apply Packs</div>
    <div id="pack-list"></div>
  </div>

  <button id="fill-btn" class="btn-primary" disabled>Auto-Fill Fields</button>
  <button id="submit-btn" class="btn-primary" disabled style="margin-top:6px; background:#22c55e;">Fill, Upload & Submit</button>
  <button id="upload-btn" class="btn-secondary" disabled>Upload Resume PDF Only</button>

  <div id="fill-results" style="display:none;">
    <ul id="field-results" class="field-list"></ul>
  </div>

  <div class="btn-row">
    <button id="sync-btn" class="btn-secondary">Sync Packs</button>
    <button id="open-agent" class="btn-secondary">Open Dashboard</button>
  </div>
  <div id="sync-badge" class="sync-badge">Auto-syncs every 5 min</div>

  <div class="settings">
    <label>JobAgent URL</label>
    <input id="server-url" type="text" placeholder="http://localhost:3000" />
  </div>

  <div class="version">v2.0.0 — Supports 8 ATS platforms</div>

  <script src="popup.js"></script>
</body>
</html>
